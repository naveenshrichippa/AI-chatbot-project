<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: auto; padding: 20px; background-color: #F8F8F6; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #ccc;
                    padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .user-msg { text-align: right; color: blue; margin: 8px 0; }
        .bot-msg  { text-align: left;  color: green; margin: 8px 0; }
        input { width: 86%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #dd7e12; color: white;
                 border: none; border-radius: 5px; cursor: pointer; }

     footer {
                margin-top: 30px;
                padding: 15px 0;
                text-align: center;
                color: #666;
                font-size: 14px;
                border-top: 1px solid #ddd;
            }

        footer strong {
                         color: #007bff;
                        }
    </style>
</head>
<body>  
    <h2>🤖 AI Chatbot</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Type your message..."/>
    <button onclick="sendMessage()">Send</button>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="user-msg">You: ${message}</div>`;

            fetch(window.location.pathname, {
                method: "POST",
                credentials: "same-origin",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": getCookie('csrftoken')
                },
                body: `message=${encodeURIComponent(message)}`
            })
            .then(res => {
                if (!res.ok) {
                    return res.text().then(text => { throw new Error(text || res.statusText); });
                }
                return res.json();
            })
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }
                chatBox.innerHTML += `<div class="bot-msg">Bot: ${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => {
                chatBox.innerHTML += `<div class="bot-msg">Bot: Error sending message.</div>`;
                console.error(error);
            });

            input.value = "";
        }

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("user-input").addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>

    <footer>
        <p>&copy; 30-06-2026 <strong>Naveen Shrichippa</strong>. All Rights Reserved.</p>
        <p>Designed & Developed with ❤️ using HTML, CSS, JavaScript, Python, Django & MySQL.</p>
    </footer>

</body>
</html>
